openapi: 3.0.0
info:
  title: 'Product Catalog API'
  description: 'Searchable product catalog with filtering, sorting, and pagination'
  version: 1.0.0
servers:
  -
    url: 'http://localhost'
    description: 'Local development server'
paths:
  /api/products:
    get:
      tags:
        - Products
      summary: 'Search and filter products'
      description: 'Perform a full-text search across products with optional filters for price range, category, stock availability, and rating. Results can be sorted and paginated.'
      operationId: 3bc143dff722e2eafd11c2595f829129
      parameters:
        -
          name: q
          in: query
          description: 'Full-text search query'
          required: false
          schema:
            type: string
            maxLength: 255
        -
          name: price_from
          in: query
          description: 'Minimum price filter'
          required: false
          schema:
            type: number
            minimum: 0
        -
          name: price_to
          in: query
          description: 'Maximum price filter'
          required: false
          schema:
            type: number
            minimum: 0
        -
          name: category_id
          in: query
          description: 'Filter by category ID'
          required: false
          schema:
            type: integer
        -
          name: in_stock
          in: query
          description: 'Filter by stock availability'
          required: false
          schema:
            type: boolean
        -
          name: rating_from
          in: query
          description: 'Minimum rating filter (0–5)'
          required: false
          schema:
            type: number
            maximum: 5
            minimum: 0
        -
          name: sort
          in: query
          description: 'Sort order'
          required: false
          schema:
            type: string
            enum:
              - price_asc
              - price_desc
              - rating_asc
              - rating_desc
              - newest
        -
          name: page
          in: query
          description: 'Page number (1-based)'
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        -
          name: page_size
          in: query
          description: 'Number of items per page'
          required: false
          schema:
            type: integer
            default: 15
            maximum: 100
            minimum: 1
      responses:
        200:
          description: 'A paginated list of products'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        422:
          description: 'Validation error'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'The price_from field must be a number.'
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
                type: object
components:
  schemas:
    Product:
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Watch
        price:
          type: number
          format: float
          example: 2499.99
        rating:
          type: number
          format: float
          example: 4.5
        in_stock:
          type: boolean
          example: true
        category_id:
          type: integer
          example: 3
        category:
          properties:
            id:
              type: integer
            name:
              type: string
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
          example: '2026-04-22T12:00:00'
      type: object
tags:
  -
    name: Products
    description: Products
